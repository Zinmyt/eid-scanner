<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eid Scanner">
<title>Eid Scanner</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d2543; color: #fff; min-height: 100vh; padding-bottom: 30px; }
  header { background: #0d2543; padding: 10px 16px; border-bottom: 3px solid #f59500; display: flex; justify-content: space-between; align-items: center; }
  header h1 { margin: 0; font-size: 16px; font-weight: 700; }
  header .staff-tag { background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 12px; font-size: 12px; cursor: pointer; }

  #counter-bar { background: linear-gradient(90deg, #1a7f3c, #145e2c); padding: 10px 16px; display: flex; justify-content: space-around; align-items: center; font-size: 13px; }
  #counter-bar .c-block { text-align: center; flex: 1; }
  #counter-bar .c-num { font-size: 22px; font-weight: 800; display: block; line-height: 1.1; }
  #counter-bar .c-label { opacity: 0.85; font-size: 11px; text-transform: uppercase; }
  #counter-bar .c-block.warn .c-num { color: #ffd84a; }

  .container { padding: 14px; max-width: 500px; margin: 0 auto; }

  #staff-picker { text-align: center; padding: 40px 20px; }
  #staff-picker h2 { margin: 0 0 25px; font-weight: 600; }
  .staff-btn { display: block; width: 100%; padding: 22px; margin: 12px 0; font-size: 22px; font-weight: 600; background: #1e4480; color: #fff; border: none; border-radius: 12px; cursor: pointer; }
  .staff-btn:active { background: #0d2543; }

  #start-camera-btn { display: block; width: 100%; padding: 22px; margin: 0 0 14px 0; font-size: 20px; font-weight: 700; background: #1a7f3c; color: #fff; border: none; border-radius: 12px; cursor: pointer; }
  #start-camera-btn:active { background: #145e2c; }
  #start-camera-btn.busy { background: #888; }

  #reader { background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 12px; position: relative; }
  #reader__scan_region img { display: none; }

  #detected-banner { background: #ffd84a; color: #1a1a1a; padding: 14px 16px; border-radius: 12px; margin-bottom: 12px; text-align: center; font-weight: 700; display: none; border: 2px solid #f59500; box-shadow: 0 2px 8px rgba(245,149,0,0.3); animation: pulse 1.5s ease-in-out infinite; }
  #detected-banner.show { display: block; }
  #detected-banner .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; font-weight: 600; margin-bottom: 4px; }
  #detected-banner .code { font-size: 18px; font-family: 'Courier New', monospace; letter-spacing: 1px; word-break: break-all; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

  #scan-now-btn { display: none; width: 100%; padding: 26px; margin: 0 0 12px 0; font-size: 26px; font-weight: 800; letter-spacing: 1px; color: #fff; border: none; border-radius: 14px; cursor: pointer; background: #555; }
  #scan-now-btn:active { transform: translateY(1px); }
  #scan-now-btn.ready { background: #f59500; box-shadow: 0 4px 12px rgba(245,149,0,0.4); }
  #scan-now-btn.show { display: block; }

  #status-msg { background: rgba(255,255,255,0.1); padding: 9px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; word-break: break-word; text-align: center; }
  #status-msg.error { background: rgba(196,48,48,0.4); }
  #status-msg.ok { background: rgba(26,127,60,0.4); }

  #manual-section { background: rgba(255,255,255,0.08); padding: 12px; border-radius: 10px; margin-top: 10px; }
  #manual-section input { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-size: 17px; border-radius: 8px; margin-bottom: 8px; text-transform: lowercase; }
  #manual-section button { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  .hint { font-size: 11px; opacity: 0.65; text-align: center; margin-top: 4px; }

  #result-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 30px; z-index: 100; transition: background 0.2s; }
  #result-overlay.show { display: flex; }
  #result-overlay.ok { background: #1a7f3c; }
  #result-overlay.already { background: #c43030; }
  #result-overlay.invalid { background: #4a4a4a; }
  #result-overlay.error { background: #6b4a00; }
  #result-icon { font-size: 110px; margin-bottom: 16px; line-height: 1; }
  #result-title { font-size: 38px; font-weight: 800; margin-bottom: 14px; }
  #result-detail { font-size: 16px; opacity: 0.95; max-width: 320px; line-height: 1.5; }
  #result-detail code { background: rgba(0,0,0,0.25); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  #result-tap { margin-top: 28px; font-size: 14px; opacity: 0.8; }
  /* Subtle hint that we're still confirming with server */
  #result-overlay .confirming { position: absolute; bottom: 70px; font-size: 11px; opacity: 0.6; }
  #result-overlay .confirming.hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>🌙 Eid Scanner</h1>
  <span class="staff-tag" id="staff-tag" onclick="changeStaff()" style="display:none;"></span>
</header>

<div id="counter-bar" style="display:none;">
  <div class="c-block"><span class="c-num" id="cnt-scanned">—</span><span class="c-label">Scanned today</span></div>
  <div class="c-block warn"><span class="c-num" id="cnt-remaining">—</span><span class="c-label">Remaining</span></div>
</div>

<div class="container">
  <div id="staff-picker">
    <h2>Who is scanning?</h2>
    <button class="staff-btn" onclick="setStaff('Staff 1')">Staff 1</button>
    <button class="staff-btn" onclick="setStaff('Staff 2')">Staff 2</button>
    <button class="staff-btn" onclick="setStaff('Staff 3')">Staff 3</button>
    <button class="staff-btn" onclick="setStaff('Staff 4')">Staff 4</button>
  </div>

  <div id="scanner-section" style="display:none;">
    <div id="status-msg">Tap the green button below to start the camera.</div>
    <button id="start-camera-btn" onclick="startCameraFlow()">📷 Start Camera</button>
    <div id="reader" style="display:none;"></div>

    <div id="detected-banner">
      <div class="label">✓ QR detected — tap SCAN</div>
      <div class="code" id="detected-code">—</div>
    </div>

    <button id="scan-now-btn" onclick="captureAndScan()">SCAN</button>

    <div id="manual-section">
      <input type="text" id="manual-input" placeholder="Or type last 4 chars (e.g. 4b81)" maxlength="20" autocomplete="off" autocapitalize="off">
      <button onclick="submitManual()">Submit code</button>
      <div class="hint">Manual entry — fallback if camera doesn't work.</div>
    </div>
  </div>
</div>

<div id="result-overlay" onclick="hideResult()">
  <div id="result-icon">✓</div>
  <div id="result-title">OK</div>
  <div id="result-detail"></div>
  <div class="confirming hidden" id="confirming-text">confirming with server…</div>
  <div id="result-tap">Tap to dismiss</div>
</div>

<script>
// ============================================================
// CONFIGURATION — paste your Apps Script web app URL here.
// ============================================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwHYgwo9Wd5NDnpJzhNoy_y0JkVe5SQvttE3pylaOXjzNH6-Ao5Cj-wtZeEISI80lyKxA/exec";
// ============================================================
</script>

<script>
let audioCtx = null;
function ensureAudio() { try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) {} }
function playTone(freq, duration, type = 'sine') { try { ensureAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.frequency.value = freq; osc.type = type; gain.gain.value = 0.2; osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration); } catch (e) {} }
function beepOk() { playTone(880, 0.15); setTimeout(() => playTone(1320, 0.15), 120); }
function beepBad() { playTone(220, 0.5, 'square'); }
function beepUnknown() { playTone(440, 0.3); }
function beepDetected() { playTone(1500, 0.05); }
</script>

<script>
const STAFF_KEY = 'eid_staff_id';
function getStaff() { return localStorage.getItem(STAFF_KEY); }
function setStaff(name) { localStorage.setItem(STAFF_KEY, name); ensureAudio(); prewarmServer(); showScanner(); }
function changeStaff() { if (confirm('Switch staff?')) { localStorage.removeItem(STAFF_KEY); location.reload(); } }

function showScanner() {
  document.getElementById('staff-picker').style.display = 'none';
  document.getElementById('scanner-section').style.display = 'block';
  document.getElementById('counter-bar').style.display = 'flex';
  const tag = document.getElementById('staff-tag');
  tag.textContent = getStaff();
  tag.style.display = 'inline-block';
  refreshCounter();
}

function setStatus(text, kind) {
  const el = document.getElementById('status-msg');
  el.textContent = text; el.className = '';
  if (kind) el.classList.add(kind);
}

function prewarmServer() {
  if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR_APPS_SCRIPT_URL') === 0) return;
  fetch(APPS_SCRIPT_URL + '?api=stats').then(r => r.json()).then(data => updateCounters(data)).catch(() => {});
}

function refreshCounter() {
  if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR_APPS_SCRIPT_URL') === 0) return;
  fetch(APPS_SCRIPT_URL + '?api=stats').then(r => r.json()).then(data => updateCounters(data)).catch(() => {});
}

function updateCounters(data) {
  if (!data) return;
  if (typeof data.scanned !== 'undefined') document.getElementById('cnt-scanned').textContent = data.scanned;
  if (typeof data.remaining !== 'undefined') document.getElementById('cnt-remaining').textContent = data.remaining;
}

function bumpCounter() {
  const sEl = document.getElementById('cnt-scanned');
  const rEl = document.getElementById('cnt-remaining');
  const s = parseInt(sEl.textContent, 10);
  const r = parseInt(rEl.textContent, 10);
  if (!isNaN(s)) sEl.textContent = s + 1;
  if (!isNaN(r) && r > 0) rEl.textContent = r - 1;
}

function unbumpCounter() {
  // Reverse the optimistic bump if server says scan was NOT actually ok
  const sEl = document.getElementById('cnt-scanned');
  const rEl = document.getElementById('cnt-remaining');
  const s = parseInt(sEl.textContent, 10);
  const r = parseInt(rEl.textContent, 10);
  if (!isNaN(s) && s > 0) sEl.textContent = s - 1;
  if (!isNaN(r)) rEl.textContent = r + 1;
}
</script>

<script>
let scanner = null;
let cameraReady = false;
let lastDecodedCode = null;
let lastDecodedAt = 0;
let bannerShownRecently = false;

// Track recently-submitted codes so user can't double-tap the same card
const recentlySubmitted = new Set();
function rememberSubmission(code) {
  recentlySubmitted.add(code);
  setTimeout(() => recentlySubmitted.delete(code), 3000);
}

function updateDetectedBanner(code) {
  const banner = document.getElementById('detected-banner');
  const codeEl = document.getElementById('detected-code');
  const scanBtn = document.getElementById('scan-now-btn');
  if (code) {
    codeEl.textContent = code;
    banner.classList.add('show');
    scanBtn.classList.add('ready');
  } else {
    banner.classList.remove('show');
    scanBtn.classList.remove('ready');
  }
}

function onScanSuccess(decodedText) {
  lastDecodedCode = decodedText;
  lastDecodedAt = Date.now();
  updateDetectedBanner(decodedText);
  if (!bannerShownRecently) {
    beepDetected();
    bannerShownRecently = true;
    setTimeout(() => { bannerShownRecently = false; }, 1500);
  }
}

setInterval(() => {
  if (lastDecodedCode && (Date.now() - lastDecodedAt > 1500)) {
    lastDecodedCode = null;
    updateDetectedBanner(null);
  }
}, 400);

async function startCameraFlow() {
  const btn = document.getElementById('start-camera-btn');
  const reader = document.getElementById('reader');
  const scanBtn = document.getElementById('scan-now-btn');

  btn.classList.add('busy');
  btn.textContent = 'Starting camera…';
  setStatus('Requesting camera permission…');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('Use Safari on iPhone or Chrome on Android.', 'error');
    btn.classList.remove('busy');
    btn.textContent = '📷 Start Camera';
    return;
  }

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
  } catch (err) {
    try { stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false }); }
    catch (err2) {
      setStatus('Camera unavailable: ' + (err2.name || err2), 'error');
      btn.classList.remove('busy');
      btn.textContent = '📷 Try Again';
      return;
    }
  }
  stream.getTracks().forEach(t => t.stop());

  reader.style.display = 'block';
  btn.style.display = 'none';
  scanBtn.classList.add('show');
  scanBtn.textContent = 'SCAN';
  setStatus('Aim at QR — tap SCAN when yellow box appears', 'ok');

  if (!window.Html5Qrcode) {
    setStatus('Scanner library failed to load.', 'error');
    return;
  }

  scanner = new Html5Qrcode("reader");
  const config = { fps: 15, qrbox: { width: 260, height: 260 }, aspectRatio: 1.0, disableFlip: false };

  try {
    await scanner.start({ facingMode: "environment" }, config, onScanSuccess);
    cameraReady = true;
  } catch (err) {
    try { await scanner.start({ facingMode: "user" }, config, onScanSuccess); cameraReady = true; }
    catch (err2) {
      setStatus('Camera could not start.', 'error');
      btn.style.display = 'block';
      btn.classList.remove('busy');
      reader.style.display = 'none';
      scanBtn.classList.remove('show');
    }
  }
}

// ===== OPTIMISTIC TAP-TO-SCAN =====
// Show OK immediately; verify with server in background; correct if needed.
function captureAndScan() {
  if (!cameraReady) { setStatus('Camera not ready', 'error'); return; }
  if (!lastDecodedCode || (Date.now() - lastDecodedAt) > 2000) {
    setStatus('No QR in view — aim camera at code', 'error');
    beepUnknown();
    return;
  }

  const code = lastDecodedCode;

  // Prevent double-tap on the same card
  if (recentlySubmitted.has(code)) {
    return;
  }
  rememberSubmission(code);

  // INSTANT optimistic UI — show OK before server replies
  showOptimisticOk(code);

  // Clear current code so next scan needs a new QR detection
  lastDecodedCode = null;
  updateDetectedBanner(null);

  // Send to server in background — correct UI if result differs
  submitCodeBackground(code);
}

function showOptimisticOk(code) {
  const overlay = document.getElementById('result-overlay');
  const icon = document.getElementById('result-icon');
  const title = document.getElementById('result-title');
  const detail = document.getElementById('result-detail');
  const confirming = document.getElementById('confirming-text');

  overlay.className = 'show ok';
  icon.textContent = '✓';
  title.textContent = 'OK — Give Meat';
  detail.innerHTML = 'Card: <code>' + code + '</code><br>By: ' + (getStaff() || '');
  confirming.classList.remove('hidden');  // tiny "confirming..." note at bottom

  beepOk();
  bumpCounter();

  // Auto-dismiss the optimistic OK after 1.5s
  setTimeout(() => {
    if (overlay.classList.contains('ok')) {
      hideResult();
    }
  }, 1500);
}

async function submitCodeBackground(code) {
  if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR_APPS_SCRIPT_URL') === 0) {
    correctResultOverlay({ result: 'error', message: 'Apps Script URL not configured.' });
    return;
  }
  try {
    const url = APPS_SCRIPT_URL + '?api=scan&code=' + encodeURIComponent(code) + '&staff=' + encodeURIComponent(getStaff() || '');
    const resp = await fetch(url, { method: 'GET', redirect: 'follow' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    correctResultOverlay(json);
  } catch (err) {
    correctResultOverlay({ result: 'error', message: err.message || String(err) });
  }
}

// If server result differs from our optimistic OK, correct the overlay
function correctResultOverlay(res) {
  const overlay = document.getElementById('result-overlay');
  const confirming = document.getElementById('confirming-text');

  // Hide "confirming…" once we have a real answer
  confirming.classList.add('hidden');

  if (!res || res.result === 'ok') {
    // Optimistic was correct — nothing to do
    return;
  }

  // Server disagreed — show the real result
  // First reverse the bumped counter (since this scan wasn't actually new)
  unbumpCounter();

  const icon = document.getElementById('result-icon');
  const title = document.getElementById('result-title');
  const detail = document.getElementById('result-detail');

  overlay.className = 'show';

  if (res.result === 'already') {
    overlay.classList.add('already');
    icon.textContent = '⚠';
    title.textContent = 'ALREADY CONTRIBUTED';
    detail.innerHTML = 'Scanned at:<br><b>' + (res.scannedAt || '') + '</b><br>by ' + (res.scannedBy || '') + '<br><br>Card: <code>' + (res.code || '') + '</code>';
    beepBad();
  } else if (res.result === 'invalid') {
    overlay.classList.add('invalid');
    icon.textContent = '?';
    title.textContent = 'INVALID CARD';
    detail.textContent = res.message || 'This QR code is not in the system.';
    beepUnknown();
  } else {
    overlay.classList.add('error');
    icon.textContent = '!';
    title.textContent = 'ERROR';
    detail.textContent = res.message || 'Unknown error';
    beepUnknown();
  }
  // For error/already, don't auto-dismiss — let staff tap to acknowledge
}

function submitManual() {
  const v = document.getElementById('manual-input').value.trim();
  if (!v) return;
  document.getElementById('manual-input').value = '';
  if (recentlySubmitted.has(v)) return;
  rememberSubmission(v);
  showOptimisticOk(v);
  submitCodeBackground(v);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'manual-input') {
    e.preventDefault();
    submitManual();
  }
});

function hideResult() {
  document.getElementById('result-overlay').classList.remove('show');
}

window.addEventListener('load', () => {
  if (getStaff()) { ensureAudio(); prewarmServer(); showScanner(); }
});

setInterval(() => { if (getStaff()) refreshCounter(); }, 30000);
</script>

</body>
</html>
